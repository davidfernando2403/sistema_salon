<!DOCTYPE html>
<html>
<head>
    <title>Reportes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>📊 Reportes del negocio</h3>
        <a href="/dashboard" class="btn btn-secondary">⬅ Volver</a>
    </div>

    <!-- ================= KPIs ================= -->

    <div class="row mb-4">

        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h6>💰 Boletas (mes actual)</h6>
                    <h4 class="text-success">S/ {{ "%.2f"|format(total_boletas) }}</h4>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h6>🧾 Facturas (mes actual)</h6>
                    <h4 class="text-primary">S/ {{ "%.2f"|format(total_facturas) }}</h4>
                </div>
            </div>
        </div>

    </div>

    <!-- ================= FILTRO RANGO ================= -->

    <div class="card mb-4">
        <div class="card-body">

            <h5>📅 Ventas por rango</h5>

            <form method="GET" action="/dashboard" class="row g-2">

                <div class="col-md-4">
                    <label>Desde</label>
                    <input type="date" name="desde" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Hasta</label>
                    <input type="date" name="hasta" class="form-control">
                </div>

                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-primary w-100">Calcular</button>
                </div>

            </form>

        </div>
    </div>

    <!-- ================= MES ================= -->

    <div class="card mb-4">
        <div class="card-body">

            <h5>📆 Ventas por mes</h5>

            <form method="GET" action="/dashboard" class="row g-2">

                <div class="col-md-6">
                    <input type="month" name="mes" class="form-control">
                </div>

                <div class="col-md-6">
                    <button class="btn btn-primary w-100">Ver total</button>
                </div>

            </form>

        </div>
    </div>

    <!-- ================= DIA ================= -->

    <div class="card mb-4">
        <div class="card-body">

            <h5>📅 Total por día</h5>

            <form method="GET" action="/dashboard" class="row g-2">

                <div class="col-md-6">
                    <input type="date" name="dia" class="form-control">
                </div>

                <div class="col-md-6">
                    <button class="btn btn-primary w-100">Ver total</button>
                </div>

            </form>

        </div>
    </div>

    <!-- ================= PRODUCCION ================= -->

    <div class="card mb-4">
        <div class="card-body">

            <h5>👩‍💼 Producción por trabajadora</h5>

            <form method="GET" action="/dashboard" class="row g-2">

                <div class="col-md-3">
                    <select name="trabajadora_prod" class="form-control">
                        {% for t in trabajadoras %}
                        <option value="{{ t.id }}">{{ t.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-3">
                    <input type="date" name="desde_prod" class="form-control">
                </div>

                <div class="col-md-3">
                    <input type="date" name="hasta_prod" class="form-control">
                </div>

                <div class="col-md-3">
                    <button class="btn btn-primary w-100">Calcular</button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
